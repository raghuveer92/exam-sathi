spring:
  datasource:
    url: jdbc:h2:mem:examsaathi_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

server:
  servlet:
    context-path: /api/v1

jwt:
  secret: test-secret-key-for-integration-tests-only-32chars
  expiration: 86400000

brevo:
  api-key: test-brevo-api-key
  sender-name: Exam Saathi
  sender-email: examsathi5@gmail.com
  verification-base-url: https://api.examsaathi.com/api
  password-reset-base-url: https://app.examsaathi.com

google:
  oauth:
    client-ids: test-client-id

app:
  cache:
    warmup-enabled: false

logging:
  level:
    com.examsaathi: WARN
